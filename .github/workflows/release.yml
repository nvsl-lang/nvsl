name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Haxe and HashLink
        run: ./scripts/install-linux-toolchain.sh

      - name: Build local tools
        run: ./scripts/build-tools.sh

      - name: Package release artifacts
        run: |
          ./scripts/package-linux-bundle.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nvsl-linux-x64
          path: |
            dist/nvsl-linux-x64.tar.gz
            dist/nvsl-linux-x64/bin/hl
            dist/nvsl-linux-x64/bin/nvslc.hl
            dist/nvsl-linux-x64/bin/nvslvm.hl

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/nvsl-linux-x64.tar.gz
            dist/nvsl-linux-x64/bin/hl
            dist/nvsl-linux-x64/bin/nvslc.hl
            dist/nvsl-linux-x64/bin/nvslvm.hl
