name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
            bundle_name: nvsl-linux-x64
            package_script: ./scripts/package-linux-bundle.sh
            archive_path: dist/nvsl-linux-x64.tar.gz
          - platform: macos
            runner: macos-15-intel
            bundle_name: nvsl-macos-x64
            package_script: ./scripts/package-macos-bundle.sh
            archive_path: dist/nvsl-macos-x64.tar.gz
          - platform: windows
            runner: windows-2022
            bundle_name: nvsl-windows-x64
            package_script: ./scripts/package-windows-bundle.sh
            archive_path: dist/nvsl-windows-x64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Haxe
        uses: tobil4sk/setup-haxe@9d1527c4bb9d1d449d196a0822118692ceeac457
        with:
          haxe-version: latest

      - name: Install Linux build tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Ensure package scripts are executable
        run: |
          chmod +x ./scripts/build-tools.sh ./scripts/build-hashlink-runtime.sh ./scripts/package-linux-bundle.sh ./scripts/package-macos-bundle.sh ./scripts/package-windows-bundle.sh ./scripts/nvsl-env.sh ./nvsl ./nvslc ./nvslvm

      - name: Build HashLink runtime
        run: |
          export NVSL_BUNDLE_PLATFORM=${{ matrix.platform }}
          export NVSL_BUNDLE_ARCH=x64
          export NVSL_OUTPUT_ENV="$GITHUB_ENV"
          ./scripts/build-hashlink-runtime.sh

      - name: Build local tools
        run: ./scripts/build-tools.sh

      - name: Package release artifacts
        run: ${{ matrix.package_script }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bundle_name }}
          path: |
            ${{ matrix.archive_path }}

  publish-release:
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release-assets/**/*.tar.gz
            dist/release-assets/**/*.zip
