name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Haxe and HashLink
        run: ./scripts/install-linux-toolchain.sh

      - name: Build local tools
        run: ./scripts/build-tools.sh

      - name: Package release artifacts
        run: |
          mkdir -p dist
          mkdir -p dist/bin
          cp README.md dist/
          cp LICENSE dist/
          cp install.sh dist/
          cp nvsl dist/
          cp nvslc dist/
          cp nvslvm dist/
          mkdir -p dist/scripts
          cp scripts/build-tools.sh dist/scripts/
          cp scripts/install-linux-toolchain.sh dist/scripts/
          cp scripts/nvsl-env.sh dist/scripts/
          cp bin/nvslc.hl dist/bin/
          cp bin/nvslvm.hl dist/bin/
          tar -czf dist/nvsl-tools-linux.tar.gz -C dist README.md LICENSE install.sh nvsl nvslc nvslvm scripts bin

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nvsl-tools-linux
          path: |
            dist/nvsl-tools-linux.tar.gz
            dist/bin/nvslc.hl
            dist/bin/nvslvm.hl

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/nvsl-tools-linux.tar.gz
            dist/bin/nvslc.hl
            dist/bin/nvslvm.hl
